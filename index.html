:root{--bar:#0A0D14;--panel:#141925;--line:rgba(255,255,255,.1);--ink:#EEF1F6;--mute:#8b93a4;--gold:#E0A93B}
*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
body{font-family:'Public Sans',sans-serif;background:#0C0F16;color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
.grotesk{font-family:'Space Grotesk',sans-serif}button{font-family:inherit;cursor:pointer}
.bar{flex:0 0 auto;background:var(--bar);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:16px;padding:0 16px;height:60px}

.switch{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px;gap:2px;margin-left:8px}

.switch button.active{background:#0C0F16;color:#fff}
.spacer{flex:1}
.open{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:#15100a;border:0;border-radius:9px;padding:10px 16px;font-weight:600;font-size:13px;text-decoration:none;font-family:'Space Grotesk'}
.meta{flex:0 0 auto;padding:9px 18px;background:#0C0F16;border-bottom:1px solid var(--line);font-size:13px;color:var(--mute)}
.meta b{color:#fff;font-family:'Space Grotesk'}
.stage{flex:1;min-height:0;background:#0C0F16}
iframe{width:100%;height:100%;border:0;background:#fff}
