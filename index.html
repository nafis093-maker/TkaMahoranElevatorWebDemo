<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy King — Concept Directions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0D12;--bar:#13161D;--panel:#1A1E27;--line:rgba(255,255,255,.09);
    --ink:#EEF1F6;--mute:#8b93a4;--accent:#5B8CFF;
    --b:#C8A35B;--d:#FF9A4D;--e:#39E0E6; /* prototype accents */
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--ink);display:flex;flex-direction:column;overflow:hidden}
  .grotesk{font-family:'Space Grotesk',sans-serif}
  button{font-family:inherit;cursor:pointer}
  a{color:inherit}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  /* top bar */
  .bar{flex:0 0 auto;background:var(--bar);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:18px;padding:0 18px;height:62px}
  .brand{display:flex;align-items:center;gap:10px;font-family:'Space Grotesk';font-weight:700;font-size:16px;white-space:nowrap}
  .brand .mk{width:30px;height:30px;border-radius:8px;background:linear-gradient(160deg,var(--d),#e0721f);color:#1a0e04;display:grid;place-items:center;font-size:15px}
  .brand .sub{display:block;font-family:'Inter';font-weight:400;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--mute)}

  .switch{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:4px;gap:2px}
  .switch button{display:flex;align-items:center;gap:9px;border:0;background:transparent;color:var(--mute);font-weight:600;font-size:13px;padding:9px 16px;border-radius:8px;transition:.16s;font-family:'Space Grotesk'}
  .switch button .dot{width:9px;height:9px;border-radius:50%}
  .switch button[data-k="premium"] .dot{background:var(--b)}
  .switch button[data-k="cinematic"] .dot{background:var(--d)}
  .switch button[data-k="kinetic"] .dot{background:var(--e)}
  .switch button:hover{color:var(--ink)}
  .switch button.active{background:var(--bg);color:var(--ink);box-shadow:0 1px 0 rgba(255,255,255,.05)}

  .spacer{flex:1}
  .tools{display:flex;align-items:center;gap:8px}
  .devs{display:flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:3px}
  .devs button{border:0;background:transparent;color:var(--mute);padding:7px 11px;border-radius:7px;font-size:12px;font-weight:600}
  .devs button.active{background:var(--bg);color:var(--ink)}
  .open-btn{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;border:0;border-radius:10px;padding:10px 16px;font-weight:600;font-size:13px;text-decoration:none}
  .open-btn:hover{filter:brightness(1.08)}

  /* meta strip */
  .meta{flex:0 0 auto;display:flex;align-items:center;gap:14px;padding:9px 20px;background:var(--bg);border-bottom:1px solid var(--line);font-size:13px;color:var(--mute)}
  .meta b{color:var(--ink);font-family:'Space Grotesk'}
  .meta .pip{width:8px;height:8px;border-radius:50%;flex:0 0 auto}

  /* stage */
  .stage{flex:1;min-height:0;display:flex;align-items:flex-start;justify-content:center;background:
     radial-gradient(120% 90% at 50% 0%,rgba(91,140,255,.06),transparent 60%),var(--bg);
     padding:18px;overflow:auto}
  .frame-shell{position:relative;width:100%;max-width:100%;height:100%;background:#000;border:1px solid var(--line);border-radius:12px;overflow:hidden;transition:max-width .35s ease;box-shadow:0 30px 80px -40px #000}
  .frame-shell.tablet{max-width:834px}
  .frame-shell.mobile{max-width:412px}
  iframe{width:100%;height:100%;border:0;display:block;background:#000}
  .loading{position:absolute;inset:0;display:grid;place-items:center;color:var(--mute);font-size:13px;font-family:'Space Grotesk';pointer-events:none;opacity:0;transition:.2s}
  .loading.show{opacity:1}
  .loading .spin{width:26px;height:26px;border:2px solid var(--line);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media (max-width:880px){
    .meta,.devs,.brand .sub{display:none}
    .bar{flex-wrap:wrap;height:auto;padding:10px 14px;gap:12px}
    .switch{order:3;width:100%;justify-content:space-between}
    .switch button{flex:1;justify-content:center;padding:10px 8px}
    .stage{padding:0}
    .frame-shell{border-radius:0;border:0}
    .frame-shell.tablet,.frame-shell.mobile{max-width:100%}
  }
</style>
</head>
<body>
  <div class="bar">
    <div class="brand"><span class="mk">▲</span><span>Energy King<span class="sub">Concept Directions</span></span></div>
    <div class="switch" id="switch">
      <button data-k="premium"  class="active"><span class="dot"></span> Premium</button>
      <button data-k="cinematic"><span class="dot"></span> Cinematic</button>
      <button data-k="kinetic"><span class="dot"></span> Kinetic</button>
    </div>
    <div class="spacer"></div>
    <div class="tools">
      <div class="devs" id="devs">
        <button data-w="desktop" class="active">Desktop</button>
        <button data-w="tablet">Tablet</button>
        <button data-w="mobile">Mobile</button>
      </div>
      <a class="open-btn" id="openBtn" href="prototypes/premium.html" target="_blank" rel="noopener">Open full page ↗</a>
    </div>
  </div>

  <div class="meta">
    <span class="pip" id="metaPip"></span>
    <span id="metaText"><b>Premium</b> — charcoal &amp; champagne gold, elegant serif, glowing ascent beam. Aspirational, high-end developments.</span>
  </div>

  <div class="stage">
    <div class="frame-shell" id="shell">
      <div class="loading" id="loading"><div><div class="spin"></div>Loading concept…</div></div>
      <iframe id="frame" src="prototypes/premium.html" title="Prototype preview" loading="eager"></iframe>
    </div>
  </div>

<script>
  const data={
    premium:{file:"prototypes/premium.html",color:"var(--b)",label:"Premium",
      desc:"charcoal &amp; champagne gold, elegant serif, glowing ascent beam. Aspirational, high-end developments."},
    cinematic:{file:"prototypes/cinematic.html",color:"var(--d)",label:"Cinematic",
      desc:"deep blue-black with warm city-light amber, animated night-skyline hero, video-ready. Bold and dramatic."},
    kinetic:{file:"prototypes/kinetic.html",color:"var(--e)",label:"Kinetic",
      desc:"charcoal with blueprint cyan &amp; safety orange, live blueprint mesh + working elevator-shaft sim. Pure engineering."}
  };
  const frame=document.getElementById('frame'),loading=document.getElementById('loading'),
        openBtn=document.getElementById('openBtn'),metaPip=document.getElementById('metaPip'),
        metaText=document.getElementById('metaText'),shell=document.getElementById('shell');

  function select(k){
    const d=data[k];if(!d)return;
    document.querySelectorAll('#switch button').forEach(b=>b.classList.toggle('active',b.dataset.k===k));
    loading.classList.add('show');
    frame.src=d.file;
    openBtn.href=d.file;
    metaPip.style.background=d.color;
    metaText.innerHTML='<b>'+d.label+'</b> — '+d.desc;
    try{localStorage.setItem('ek_concept',k);}catch(e){}
    location.hash=k;
  }
  frame.addEventListener('load',()=>loading.classList.remove('show'));

  document.getElementById('switch').addEventListener('click',e=>{
    const b=e.target.closest('button');if(b)select(b.dataset.k);
  });
  document.getElementById('devs').addEventListener('click',e=>{
    const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#devs button').forEach(x=>x.classList.toggle('active',x===b));
    shell.classList.remove('tablet','mobile');
    if(b.dataset.w!=='desktop')shell.classList.add(b.dataset.w);
  });
  // keyboard 1/2/3
  addEventListener('keydown',e=>{const m={'1':'premium','2':'cinematic','3':'kinetic'};if(m[e.key])select(m[e.key]);});

  // initial: hash > saved > default
  let start=(location.hash||'').replace('#','');
  if(!data[start]){try{start=localStorage.getItem('ek_concept');}catch(e){}}
  if(data[start]&&start!=='premium')select(start);
</script>
</body>
</html>
